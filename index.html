<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Dashboard de Carros - UCV</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["pandas", "plotly", "statsmodels"], 
        entrypoint: "main.py",
        files: {
          "main.py": `
import streamlit as st
import pandas as pd
import plotly.express as px
import os

# Eliminamos sys._MEIPASS ya que en el navegador no aplica
class CarApp:
    def __init__(self, data_path):
        self.data_path = data_path
        self.df_original = None  
        self.df = None           
        self.columnas_espanol = {
            'Brand': 'Marca', 'Year': 'Año', 'Engine Size': 'Tamaño del Motor',
            'Fuel Type': 'Tipo de Combustible', 'Transmission': 'Transmisión',
            'Mileage': 'Kilometraje', 'Condition': 'Condición', 'Price': 'Precio',
            'Model': 'Modelo'
        }

    def cargar_y_limpiar(self):
        try:
            # En Stlite, leeremos el CSV desde una URL o archivo montado
            self.df_original = pd.read_csv(self.data_path)
            self.df_original = self.df_original.rename(columns=self.columnas_espanol)
            self.df = self.df_original.copy()
        except Exception as e:
            st.error(f"Error al cargar los datos: {e}")

    def aplicar_filtros(self):
        st.sidebar.header("🔍 Filtros de Búsqueda")
        marcas = sorted(self.df_original['Marca'].unique())
        marcas_sel = st.sidebar.multiselect("Selecciona Marcas", marcas, default=marcas)
        año_min, año_max = int(self.df_original['Año'].min()), int(self.df_original['Año'].max())
        rango_año = st.sidebar.slider("Rango de Año", año_min, año_max, (año_min, año_max))
        transmisiones = ["Todas"] + list(self.df_original['Transmisión'].unique())
        trans_sel = st.sidebar.selectbox("Transmisión", transmisiones)
        condiciones = self.df_original['Condición'].unique()
        cond_sel = st.sidebar.multiselect("Condición", condiciones, default=list(condiciones))
        combustibles = self.df_original['Tipo de Combustible'].unique()
        comb_sel = st.sidebar.multiselect("Tipo de Combustible", combustibles, default=list(combustibles))
        km_min, km_max = int(self.df_original['Kilometraje'].min()), int(self.df_original['Kilometraje'].max())
        rango_km = st.sidebar.slider("Kilometraje Máximo", km_min, km_max, (km_min, km_max))

        query = (
            self.df_original['Marca'].isin(marcas_sel) &
            self.df_original['Año'].between(rango_año[0], rango_año[1]) &
            self.df_original['Condición'].isin(cond_sel) &
            self.df_original['Tipo de Combustible'].isin(comb_sel) &
            self.df_original['Kilometraje'].between(rango_km[0], rango_km[1])
        )
        self.df = self.df_original[query]
        if trans_sel != "Todas":
            self.df = self.df[self.df['Transmisión'] == trans_sel]

    def render_ui(self):
        st.markdown("""<style>.block-container { padding-top: 1rem; } [data-testid="stMetricValue"] { font-size: 1.8rem; color: #1f77b4; }</style>""", unsafe_allow_html=True)
        if self.df is not None and not self.df.empty:
            st.markdown('<div style="text-align: right;"><p style="font-size: 24px; font-weight: bold; margin: 0;">🚗 Dashboard de Precios de Vehículos</p></div>', unsafe_allow_html=True)
            st.markdown("<hr style='margin: 10px 0px 20px 0px; opacity: 0.2;'>", unsafe_allow_html=True)
            
            h1, h2, h3, h4 = st.columns(4)
            h1.metric("Precio Promedio", f"$\${self.df['Precio'].mean():,.0f}")
            h2.metric("Kilometraje Medio", f"{self.df['Kilometraje'].mean():,.0f} km")
            h3.metric("Vehículos Filtrados", len(self.df))
            h4.metric("Marca más Frecuente", self.df['Marca'].mode()[0] if not self.df.empty else "N/A")

            t1, t2, t3 = st.tabs(["📊 Descriptivo", "📉 Evolución", "📈 Correlación"])
            with t1:
                col_a, col_b = st.columns([6, 4])
                with col_a:
                    st.subheader("Evolución General de Precios")
                    df_p = self.df.groupby("Año")["Precio"].mean().reset_index()
                    st.plotly_chart(px.bar(df_p, x="Año", y="Precio"), use_container_width=True)
                with col_b:
                    st.subheader("Cuota de Mercado")
                    st.plotly_chart(px.pie(self.df, names='Tipo de Combustible', hole=0.4), use_container_width=True)

            with t2:
                st.subheader("Precio Promedio por Marca")
                df_em = self.df.groupby(["Año", "Marca"])["Precio"].mean().reset_index()
                st.plotly_chart(px.line(df_em, x="Año", y="Precio", color="Marca", markers=True), use_container_width=True)

            with t3:
                st.subheader("Matriz de Correlación")
                vars = ['Tamaño del Motor', 'Año', 'Kilometraje', 'Precio']
                df_c = self.df[vars].corr()
                st.plotly_chart(px.imshow(df_c, text_auto=True, color_continuous_scale='RdBu_r'), use_container_width=True)

                st.subheader("Precio vs. Kilometraje")
                st.plotly_chart(px.scatter(self.df, x="Kilometraje", y="Precio", color="Condición", trendline="ols"), use_container_width=True)
        else:
            st.error("⚠️ No hay vehículos que coincidan.")

if __name__ == "__main__":
    st.set_page_config(page_title="Análisis de Carros - UCV", layout="wide")
    # IMPORTANTE: Cambia esta URL por la URL RAW de tu archivo CSV en GitHub
    DATA_URL = "https://raw.githubusercontent.com/juandh382/analisis-de-precios-de-carros/refs/heads/main/db/precios_carros_arreglado.csv"
    app = CarApp(DATA_URL)
    app.cargar_y_limpiar()
    if app.df_original is not None:
        app.aplicar_filtros()
        app.render_ui()
          `,
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
